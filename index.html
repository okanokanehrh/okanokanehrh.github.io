<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H4CKTİCKL - Ana Sayfa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        
        /* Arka plan video alanı */
        .video-bg { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.4; }
        
        .content { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: rgba(0,0,0,0.6); }
        
        h1 { font-size: 3.5rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        
        .nav-links { display: flex; gap: 20px; margin-top: 30px; }
        
        .btn { padding: 12px 30px; border: 2px solid #00ff00; color: #00ff00; text-decoration: none; font-weight: bold; transition: 0.4s; text-transform: uppercase; border-radius: 5px; }
        
        .btn:hover { background: #00ff00; color: black; box-shadow: 0 0 20px #00ff00; }
    </style>
</head>
<body>
    <video autoplay muted loop class="video-bg">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="content">
        <h1>H4CKTİCKL</h1>
        <p>Sisteme Giriş Yapıldı. Kaynaklar Hazır.</p>
        
        <div class="nav-links">
            <a href="video.html" class="btn">Videolar</a>
            <a href="dio2.html" class="btn">Projeler</a>
        </div>
    </div>
</body>
</html>
